sync_mode: overwrite
schema_change: upward_stream
table: ofi_servico
columns:
  - EMPRESA
  - SERVICO
  - MAODEOBRA
  - MODELO_SERVICO
  - CATEGORIA_SERVICO
  - CODIGO_TRIBUTACAO
  - UNIDADE_TEMPO
  - ACRESCIMO_DESCONTO
cursor:
  query:
    SELECT *
    FROM OFI_SERVICO OS
      LEFT JOIN OFI_SERVICO_OS OSO
        ON OSO.EMPRESA = OS.EMPRESA
        AND OSO.SERVICO = OS.SERVICO
      LEFT JOIN OFI_ORDEM_SERVICO OOS
        ON OOS.EMPRESA = OSO.EMPRESA
        AND OOS.NRO_OS = OSO.NRO_OS
    WHERE OOS.DTA_EMISSAO >= :dta_emissao
  rules:
    dta_emissao:
      on_create: TO_DATE('2024-01-01', 'YYYY-MM-DD')
      on_update: ADD_MONTHS(SYSDATE, -2)
